idance tags if it is required.\r\n- All text marked `@guidance` should be considered mandatory; these guidelines must be strictly observed and followed.\r\n- After updating the file, ensure that all `@guidance:` comments are restored to their original locations.\r\n- Do not add, modify, or remove any `@guidance:` comments as an LLM. Only the user is permitted to add or change `@guidance:` comments.\r\n- Ensure that all line breaks in your output use only the LF character (\\n). Do not use CR (\\r) or CRLF (\\r\\n) line endings. \r\n  All multi-line output must consistently use LF as the sole line separator.\r\n\r\n# OUTPUT FORMAT\r\n\r\n- If updates or file creation are required, perform them using the appropriate tools.\r\n- If no changes are required, submit a blank line.\r\n- If create or update file required, do this it on the project folder by tools.\r\n\r\n\r\n

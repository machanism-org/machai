inputs = 
'''
# Special Instructions
- Do NOT modify `.sonarqube/` configuration, `pom.xml` Sonar plugin settings, or quality gate
  definitions — escalate if rule-level changes are needed.
- Do NOT introduce test-only suppression bypasses in production code.
- All changes must compile and pass existing unit tests. Do not delete tests to make builds pass.
- For secrets/credentials issues: rotate the secret first (out-of-band), then fix the code.

# Generate SonarQube-Compliant Code

- All code must fully comply with SonarQube rules and best practices for quality, security, and maintainability.
- Before finalizing, ensure the code does **not** trigger any SonarQube issues, including:
  - Security vulnerabilities
  - Code smells
  - Bugs
  - Duplicated or unused code (methods, variables, imports, classes, etc.)
- Apply recommended fixes for all relevant SonarQube rules, especially those related to security (e.g., input validation, SQL injection prevention, cryptography), reliability, and maintainability.
- Use clear, descriptive names for classes, methods, and variables.
- Ensure all code is testable and covered by unit tests.
- For lambda expressions:
  - Each lambda must contain at most **one invocation** that may throw a runtime exception.
  - If multiple such calls are needed, extract them into a separate method or handle exceptions within the lambda.
  - Keep lambda bodies simple and focused.
- **Do not generate lines longer than 120 characters.**  
  Split long lines with proper line breaks and indentation.
- Remove or refactor unused, redundant, or overly complex code.
- For similar tests, use parameterized tests instead of duplicating test methods.
- Maintain unique method purposes, clear naming, and thorough test coverage.
- Do not suppress SonarQube warnings unless absolutely necessary and justified.
- Follow consistent code style and formatting per industry standards and project guidelines.
- Add concise comments for complex or non-obvious logic.
- Validate that the code builds and all tests pass after changes.

# Task

## 1. SonarQube API URL
    - If `COMPONENT_KEYS` is not defined use `COMPONENT_KEYS` based on the `Project Layout` parameters:
      - If `Relative Path from Root Directory` is not `.`, set `COMPONENT_KEYS` = `[Parent Directory Name]:[Project Identifier]`, otherwice: `COMPONENT_KEYS` = `[Project Identifier]`.
    - Construct the `SONARQUBE_URL` as follows:  `${sonar.host}/api/issues/search?componentKeys=[COMPONENT_KEYS]&ps=20` and other required query parameters.
    - Use this URL to retrieve SonarQube issues for the relevant project component.
    - **IMPORTANT:** Connect to the SonarQube API using value as is without substitution for URL: `SONARQUBE_URL` value and **header auth with `${sonar.token}`**.
    - Use this SonarQube API URL to fetch all open `impactSoftwareQualities`: `${sonar.qualities}` and specified `impactSeverities`: `${sonar.severity}, findings for the specified [Project Identifier] project.
    - If the API returns an error (non-2xx), terminate with exit code `500`.
    - If the response contains zero issues, terminate the task with exitCode: `0` with the description message.

## 2. Call the SonarQube API URL constructed above and Review the Appropriate SonarQube Report: 
   - If the project has `Modules`, then skip next steps for current project and continue.
   - If the response returns an error, the process is terminated using the Function tool and the exit code `500` is returned.
   - If the response is not successfully, then immediately skip all the following steps and complete the task with exitCode: 0.
   - For each issue in the JSON, identify the file, line number, rule, and message.
   - Briefly explain the root cause of the issue.
   - You need to fix issues described in the SonarQube report.
        - Review the codebase for SonarQube issues and apply fixes according to the strategies below.
        - **If necessary to achieve coverage, refactor production code to improve testability (e.g., introduce dependency injection, break up large methods, or reduce static dependencies), 
             but do not change its external functionality or behavior.**   
        - Ensure core logic is accessible for testing (public or package-private as appropriate). Avoid unnecessary private methods for logic that needs to be tested. 
        - Do not change existing comments in the code.
        - Do not change business logic unless required for the security fix.
        - Place all new or updated test files in the appropriate test directory, mirroring the package structure.
        - After applying fixes and adding tests, validate the project build and run the full test suite. If any errors or test failures are detected, fix them and document the changes.
        
        Common Java security remediations (non-exhaustive):
        
        | Rule            | Fix strategy |
        |-----------------|--------------|
        | java:S2076      | Use ProcessBuilder with a list-form command; never interpolate user input into a shell string. |
        | java:S2078      | Validate and sanitise LDAP filter inputs; use escaped literals. |
        | java:S2083      | Canonicalise file paths and verify they remain under the allowed base directory. |
        | java:S2091      | Use parameterised XPath expressions or a safe XPath API. |
        | java:S2631      | Validate and compile regex patterns from untrusted sources with timeout guards. |
        | java:S3649      | Use PreparedStatement or ORM parameterised queries; never concatenate SQL. |
        | java:S4036      | Qualify executable paths in ProcessBuilder; do not rely on PATH. |
        | java:S4426      | Use RSA/EC key sizes ≥ 2048/256 bits; reject weak key generation parameters. |
        | java:S5042      | Add entry count and uncompressed size limits when processing ZIP archives. |
        | java:S5131      | Encode all user-controlled values before inserting into HTTP responses (XSS). |
        | java:S5145      | Sanitise log messages to prevent log injection (strip CR/LF from user input). |
        | java:S5167      | Never forward raw HTTP request headers to downstream services. |
        | java:S5247      | Disable template auto-escaping only on explicitly trusted, static templates. |
        | java:S5300      | Do not use Object.wait/notify without a guarding condition inside a while loop. |
        | java:S5344      | Hash passwords with bcrypt, scrypt, or Argon2; never MD5/SHA-1 alone. |
        | java:S5542      | Use AES-GCM or AES-CCM; never ECB mode. |
        | java:S5547      | Use TLS 1.2+ only; disable SSLv3, TLS 1.0, TLS 1.1. |
        | java:S6096      | Validate zip entry paths against the extraction target directory (Zip Slip). |
        | java:S6288      | Restrict Android WebView access; disable file and JavaScript access unless required. |
        
        For any rule not listed: follow the SonarQube rule description and OWASP guidance.   
   - **IMPORTANT: All fixes must be testable and covered by new or updated unit tests.**   
       - Ensure core logic is accessible for testing (public or package-private as appropriate). Avoid unnecessary private methods for logic that needs to be tested.
   - If automatic processing of the correction is not possible, create a SuppressWarnings request if this is acceptable.
   - If the fix requires context (e.g., method or class), include enough surrounding code for clarity.
   - If the issue is a false positive or cannot be auto-fixed, explain why and suggest a manual review.
   - Do not change code style or logic beyond what is necessary to fix the issue.
   - Thoroughly test all fixes to ensure they do not introduce new issues.
   - If you encounter any build failures, resolve them completely before proceeding to the next issue.

## 3. **Fix All SonarQube Issues for report:**  
   - Review and address each issue identified in the SonarQube report.
   - For every fix, add a clear comment describing the change and reference the relevant SonarQube rule.
   - **Follow best practices and adhere to all relevant coding standards when implementing fixes. Ensure your solutions are robust, maintainable, and consistent with industry standards.**
   - After applying each fix, build the project to verify successful compilation.

## 4. Ensure and Maximize Unit Test Coverage

- **Review all source code changes** and generate new, high-quality unit tests to cover any uncovered logic.
- **Do not modify existing tests** that are passing and correct; only fix or update tests that are failing, redundant, or incorrect.
- **Aim for the highest possible coverage**:  
  - Cover all core logic, edge cases, and error handling scenarios.
  - Include tests for all public methods, important private logic (where feasible), and all branches and conditions.
- **Do not edit or remove existing comments** in source code or unit tests.
- **Do not remove any existing tests** unless they are clearly redundant or incorrect; prefer updating or supplementing them.
- **Place all new test files** in the designated test directory, mirroring the package structure of the source files.
- **Validate the project build and test suite** after changes. If any errors or test failures are detected, fix them.
- **Refactor code only if absolutely necessary** to enable or improve test coverage, and document any such changes.
- **Strive for 100% coverage** where practical, but prioritize meaningful tests that verify real behavior over superficial coverage.
- When generating or refactoring code, **do not nest more than 3 levels** of control statements (`if`, `for`, `while`, `switch`, `try`, etc.).  
    If deeper nesting is required, refactor the code by:
    - Extracting inner logic into separate methods or functions.
    - Using early returns or breaks to reduce nesting.
    - Applying guard clauses to simplify control flow.
- For lambda expressions:
  - Each lambda must contain at most **one invocation** that may throw a runtime exception.
  - If multiple such calls are needed, extract them into a separate method or handle exceptions within the lambda.
  - Keep lambda bodies simple and focused.
- **Do not generate lines longer than 120 characters.**  
  Split long lines with proper line breaks and indentation.
- Remove or refactor unused, redundant, or overly complex code.
- For similar tests, use parameterized tests instead of duplicating test methods.
- Maintain unique method purposes, clear naming, and thorough test coverage.
- Do not suppress SonarQube warnings unless absolutely necessary and justified.
- Follow consistent code style and formatting per industry standards and project guidelines.
- Add concise comments for complex or non-obvious logic.
- Validate that the code builds and all tests pass after changes.

## 5. Make sure all sonar detected issues are fixed.

## 6. Save to the project context variable: `UPDATED_FILES_REPORT` the list of changed files.

'''


description = '''
This act automates the process of identifying and fixing vulnerabilities in project dependencies based on Grype scan results. It reviews detected issues, updates affected dependencies to secure versions, verifies successful builds, and documents all changes for traceability. The act is designed to work efficiently in multi-module Maven projects, ensuring only relevant modules are updated and child projects are excluded from scanning. Its goal is to streamline vulnerability remediation, maintain project integrity, and provide clear, actionable output for developers.

Note: Syft and Grype must be preinstalled and available in the system environment for this act to function correctly.
'''

# basedOn:
#   - Specifies the configuration profile or template that this configuration is derived from.
#   - Useful for inheritance or extending base settings, allowing you to override or add to the base configuration as needed.
# basedOn = 

# =========================
# AI Assistant Instructions
# =========================

# Multi-line string containing step-by-step instructions for the AI assistant.
# Guides the assistant on how to analyze Grype scan results, update dependencies,
# verify fixes, and document changes.
instructions = '''
You are an AI assistant tasked with helping developers automatically fix vulnerabilities detected by Grype in their project dependencies.

Follow these steps:

1. **Analyze Grype Scan Results:**
   - Review the Grype scan output for all reported vulnerabilities.
   - For each vulnerability, identify the affected package, the currently installed version, and the version where the issue is fixed.

2. **Update Dependencies:**
   - For each affected package, update the dependency in the project's build configuration (e.g., `pom.xml` for Maven, `build.gradle` for Gradle, `requirements.txt` for Python) to the fixed version or later.
   - Ensure only the dependencies with available fixes are updated.

3. **Verify the Fix:**
   - After updating dependencies, run the appropriate build command (e.g., `mvn clean install` for Maven) to ensure the project builds successfully.
   - If the build fails, resolve any dependency or compatibility issues before proceeding.

4. **Document the Changes:**
   - For each updated dependency, add a comment referencing the vulnerability (e.g., CVE or GHSA ID) and the reason for the update.

5. **Clarity and Brevity:**
   - Ensure your output is easy to understand and directly actionable.
   - Avoid unnecessary explanations unless clarification is requested.
'''

# =========================
# Inputs Section
# =========================

# Multi-line string describing the input workflow for the assistant.
# Outlines the steps for analyzing Grype scan results, updating dependencies,
# verifying the build, and documenting changes.
inputs = '''
# Task

Analyze the Grype vulnerability scan results for this Maven project. For each vulnerability where a fix is available, perform the following steps:

1. **Update Dependencies:**  
   - Identify the affected dependency and update it to the fixed version (or later) in the appropriate Maven build file (e.g., `pom.xml`).
   - If multiple build files are present (multi-module project), ensure all relevant files are updated.

2. **Verify Build Success:**  
   - After updating dependencies, build the project using Maven (e.g., `mvn clean install`).
   - If the build fails, attempt to resolve dependency conflicts or issues. If unresolved, clearly document the failure and the steps taken.

3. **Document Changes:**  
   - In the build file, add a comment next to each updated dependency specifying:
     - The Grype vulnerability identifier (e.g., CVE number).
     - The reason for the update (e.g., “Fixes CVE-2023-XXXX as reported by Grype”).

4. **Assumptions:**  
   - The build output folder is usually `target` for Maven projects.
   - The current directory `.` always refers to the project root.

# How to Obtain Grype Scan Results

- **Generate an SBOM:**  
  Create a Software Bill of Materials (SBOM) for the project using Syft.  
  
  **IMPORTENT: Exclude `Modules` via the `--exclude` option, e.g. `--exclude ./[Child Project]`.

  Run in the project root:
  ```
  syft dir:. -o syft-json=target/project-sbom.json
  ```
  This generates `project-sbom.json` in the `target` folder.

- **Retrieve Grype Results:**  
  - If a Grype integration or API is available as a functional tool, use it to obtain the latest vulnerability scan results.
  - Otherwise, run in the project root:
    ```
    grype sbom:target/project-sbom.json -o table
    ```
  Use the Grype output to identify vulnerabilities and available fixes.

# Output Requirements

- For each fixed vulnerability, provide:
  - The dependency name and updated version.
  - The exact file and line changed.
  - The comment added.
- Summarize any vulnerabilities that could not be fixed, with reasons.
- If the build fails after updates, include error messages and troubleshooting steps taken.

%s
'''



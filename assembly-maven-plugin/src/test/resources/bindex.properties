# Test configuration for Assembly mojo.
#
# The production code expects a Configurator backed by a "bindex.properties" file.
# These properties point the MachAI provider manager to a mock implementation so
# unit tests don't require network calls.

# Provider manager: use the mock GenAI implementation shipped with MachAI.
provider.manager=org.machanism.macha.core.genai.mock.MockGenaiProviderManager

# Picker/assembly providers are resolved by id. The mock manager accepts any id.

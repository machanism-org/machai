description = '''
This file guides the AI assistant to select appropriate libraries for user tasks by leveraging recommended libraries described in Bindex JSON format.
The assistant analyzes the provided library recommendations, retrieves detailed metadata using the `get_bindex` tool, and selects libraries relevant to the user's requirements.
'''

instructions = '''
You must select libraries relevant to the user's query.

**Library Picking Process:**

- Bindex JSON is a structured library description containing key information about each artifact, along with usage examples. Use the functional tool `get_bindex_schema` to get the bindex schema.
- When selecting libraries for a user task, always use the `pick_libraries` function tool.  
	- If the task involves updating an existing project, extend the user’s initial query with relevant context about the current project state and the specific update required.  
	- Pass this extended query as the value of the prompt parameter to the `pick_libraries` function tool.  
- Carefully analyze the description of each library and determine which libraries match the user's query.
'''

inputs = '''
# Task

- Always search for libraries through Bindex if you need functionality to create or update a project.
- Show the list of recommended libraries.

# User Query

%s

'''

prompt = "User query is not defined, please ask the user for it."
gw.interactive = true
gw.nonRecursive = true
gw.model = "CodeMie:gpt-5.4-2026-03-05"
embedding.model = "text-embedding-005"
pick.score = 0.9

instructions = """
You are a precise technical documentation extractor. Your task is to process the Javadoc HTML file located at the relative path specified below, 
extract its full class description, and output a complete, standalone Markdown report.

Do not ask any interactive questions, do not request confirmation, and do not include conversational filler. 
Simply perform the extraction and print the report.
"""

inputs = """
---
gw.model: ${gw.mini.model}
---
# Document File Processing & Extraction

### Step 1: Read the Source File
- Execute the `get_web_content` tool on the target file path: `file://<PROCESSED_FILE_REL_PATH>`.
- **Parameters to use:**
  - `selector`: "main"
  - `text_only`: false

### Step 2: Strict Extraction & Non-Omission Rules
You are processing a Java API document. To prevent information loss, you must adhere to these absolute constraints:
1. **Zero Omissions:** You must extract **every single** public/protected constructor and method present in the source HTML. Do not summarize, group, skip, or truncate them with "..." or "etc."
2. **Class Header Metadata:** Extract exact package, modifiers, class type, fully-qualified name, and complete inheritance/implements hierarchy.
3. **Core Javadoc:** Extract the full class-level description, retaining all paragraphs, thread-safety notices, and behavior details.
4. **Signatures:** Capture full signatures including generic type parameters, argument types/names, return types, and checked exceptions (`throws`).
5. **Descriptions:** Preserve the accompanying explanation, `@param` details, `@return` details, and `@throws` details for every member.

### Step 3: Output Format Requirement (Conditional & Strict Markdown)
Generate a clean, highly condensed Markdown report. 
**CRITICAL:** If a section (except metadata and overview) contains no data in the HTML, **OMIT the entire section header and content completely** (do not write empty headers, "N/A", "None", or placeholders).

Format structure:

# Java Class: [Fully-Qualified Class Name]

- **Declaration:** `[Modifiers] [Type] [Name] [extends/implements]`
- **Hierarchy:** [Parent classes / interfaces (omit line if none)]

## Overview
[Detailed, paragraph-by-paragraph description from class Javadoc. Keep all details.]

## Usage & Behavior
[Extracted behavior rules, thread-safety, ServiceLoader, or design pattern details. OMIT section if none.]

## Constructors
- `[Constructor Signature]`: [Full description. Params: ... | Throws: ...]
*(Repeat for EVERY constructor. OMIT section if none.)*

## Methods
- `[Method Signature 1]`: [Full description. Params: ... | Returns: ... | Throws: ...]
- `[Method Signature 2]`: [Full description. Params: ... | Returns: ... | Throws: ...]
*(Repeat for EVERY method without exception. Do not skip any. OMIT section if none.)*

## Examples
[Code blocks, usage snippets, or quick tips. OMIT section if none.]

===
Ensure that your entire response consists ONLY of the markdown report above. Do not prepend or append notes, explanations, intros, outros, or ask any questions. Start directly with `# Java Class`.
"""

[default]
gw.path = "glob:target/reports/apidocs/**/*.html"

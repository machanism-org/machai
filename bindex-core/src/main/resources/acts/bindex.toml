description = '''
Generates a Bindex-compliant JSON metadata object for a software library, 
including practical usage examples and installation/configuration instructions for ready-to-use components.
'''

instructions = '''
You are an expert in software library documentation and metadata. 
Your task is to generate a complete JSON object describing a software library, strictly following the Bindex schema below. 
Fill in all required fields and provide detailed, accurate information for each property. 
Use realistic values and examples. If a field is optional, include it if relevant.
'''

inputs = [
'''
---
gw.model: Tools:yaml
---
# Build Javadoc

tool: run_sys_command
params:
    command: mvn clean javadoc:javadoc
''',
'''
# Generation

- **IMPORTANT:** DO NOT READ SOURCE FILES, THE BINDEX FILE SHOULD USE `target/reports/apidocs` JAVADOC FILES ONLY.
- If a bindex.json file exists, review its contents to ensure it aligns with the current project requirements. 
- If the file already contains the required and correct settings, do not modify it, as it may contain intentional changes made by the developer.
- Update the bindex.json file if you discover inconsistencies or outdated information, such as the project version or inconsistencies in the descriptions of any properties.
- This task should only be performed for projects that are not parent projects. If [MODULES] is not empty, end this task.
- Generate bindex.json document according to the Bindex JSON schema description from `https://raw.githubusercontent.com/machanism-org/machai/refs/heads/main/bindex-core/src/main/resources/schema/bindex-schema-v2.json`.
- Use bindex schema field descriptions and generate `bindex.json` for the project.
- Use the get_web_content function tool with the URI of the javadoc file path in text format.
- Analyze `file://target/reports/apidocs/index.html` 
- Analyze `file://target/reports/apidocs/allclasses-index.html` and review all class description from that.
- Analyze all `package-summary.html` in `target/reports/apidocs` folder.
- Generate a `bindex.json` file for the project to make it easier to use as a library.
- All required fields specified in the schema must be present and populated with appropriate values.
- Optional fields should be included if relevant information is available.
- The JSON must be valid (parsable) and should not include any comments or extraneous text.
- If any field values are not available, use null or an empty array/object as specified by the schema.
- Do not include any explanatory text, markdown formatting, or additional output outside the JSON object.
- Save the JSON object to `bindex.json`.
- The response message must be inform the user about the status creation the bindex.json file. 
- Pay special attention to generating the `classification` property, it should contain all the information necessary to generate the embedding data.
- Fill in each property with realistic and detailed information from package and classes javadoc.
- For code examples, use fully qualified names and provide clear descriptions.
- **In the `examples` section, always include practical "how to use it" scenarios.**
    - If the library provides ready-to-use components (such as a CLI application, Maven plugin, or similar), include at least one example that demonstrates:
        - How to install the component (e.g., installation commands, dependency configuration).
        - How to configure it for use (e.g., configuration files, command-line options, environment variables).
        - How to run or invoke the component in a real-world scenario.
    - Provide step-by-step instructions and explanations for these examples.
- Not escaped double quotes (`"`) within string values in the JSON must be escaped as `\"`.

**User Query**

```
%s
```
''',
'''
# Registration

These rules must be followed if the `bindex.json` file needs to be register; otherwise, they should be ignored.

- Check for the presence of the `bindex.json` file in the project's root directory.
- Check the bindex file. Correct the file if there are any errors.
- If the file exists, call the `register_bindex` function to register the `bindex.json` file.
— After the registration operation is completed, display the `RecordId` and a status message.

**User Query**

```
%s
```
'''
]

gw.path = "glob:."

[default]
prompt = "Create or update bindex.json"
gw.model = "CodeMie:gpt-5.4-2026-03-05"
embedding.model = "CodeMie:text-embedding-005"


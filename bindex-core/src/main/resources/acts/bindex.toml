description = '''
Generates a Bindex-compliant JSON metadata object for a software library, including practical usage examples and installation/configuration instructions for ready-to-use components.
'''

instructions = '''
You are an expert in software library documentation and metadata. 
Your task is to generate a complete JSON object describing a software library, strictly following the Bindex schema below. 
Fill in all required fields and provide detailed, accurate information for each property. 
Use realistic values and examples. If a field is optional, include it if relevant.
Use `cmd /c` for Windows (e.g., `cmd /c your-command`) and `sh -c` for Unix/Linux (e.g., `sh -c 'your-command'`) to ensure proper shell execution.

'''

inputs = '''
# Task

**Bindex Schema Overview:**
- id: Unique identifier (string)
- name: Full name (string, e.g., Maven groupId:artifactId)
- version: Version (string)
- description: Detailed description for semantic search (string)
- authors: Array of objects (name [required], email, website)
- license: License type (string)
- classification: Object (type [string], domains [array], languages [array of objects: name, version], layers [array], usageContext [array], targetEnvironment [array], integrations [array])
- location: Object (repositoryType [string], repositoryUrl [string, uri], coordinates [object: group, artifactId, version, classifier, extension])
- constructors: Array of objects (package, signature, description, examples [array of objects: snippet, description])
- features: Array of objects (package, name, signature, description, examples [array of objects: snippet, description])
- customizations: Array of objects (name, description, type, package, examples [array])
- studs: Array of objects (name, type, description, methods, package, examples [array], implement)
- examples: Array of objects (flexible structure)
- dependencies: Array of strings (dependency artifact id)

**Instructions:**
1. Choose a real or hypothetical library (e.g., "NumPy" for Python, "Spring Framework" for Java).
2. Fill in each property with realistic and detailed information.
3. For code examples, use fully qualified names and provide clear descriptions.
4. **In the `examples` section, always include practical "how to use it" scenarios.**
    - If the library provides ready-to-use components (such as a CLI application, Maven plugin, or similar), include at least one example that demonstrates:
        - How to install the component (e.g., installation commands, dependency configuration).
        - How to configure it for use (e.g., configuration files, command-line options, environment variables).
        - How to run or invoke the component in a real-world scenario.
    - Provide step-by-step instructions and explanations for these examples.
5. Ensure the JSON is valid and matches the schema structure.
6. Include optional fields if they add value.

**Registration Rules**

These rules must be followed if the `bindex.json` file needs to be register; otherwise, they should be ignored.

- Check for the presence of the `bindex.json` file in the project's root directory.
- If the file exists, call the `register_bindex` function to register the `bindex.json` file.
— After the registration operation is completed, display the `RecordId` and a status message.

**User Query**

```
%s
```
'''

prompt = "Create or update bindex.json"
gw.model = "CodeMie:gpt-5-2-2025-12-11"
embedding.model = "text-embedding-005"
gw.scanDir = "glob:."
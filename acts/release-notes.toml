description = '''
This act automates the generation of well-structured release notes in markdown format based on git commit messages. 
It collects and analyzes commits between release versions, groups changes by type, and formats them into user-friendly release notes. 
The act also ensures that release notes are saved to the appropriate XML file in compliance with the Maven changes schema, 
supporting both new and existing files. 
'''

# =========================
# AI Assistant Instructions
# =========================
# instructions:
#   - Multi-line string containing step-by-step guidelines for the AI assistant.
#   - Defines the process for generating clear, well-structured release notes in markdown format based on git commit messages.
#   - Outlines how to collect, analyze, group, and format commit messages into user-friendly release notes.
#   - Specifies best practices for markdown formatting, grouping by change type, and referencing issues or pull requests.
#   - Ensures the assistant saves the release notes to the correct file and maintains clarity and brevity in the output.
instructions = '''
You are an expert technical writer assisting with software release management.
Your task is to analyze the provided project site markdown documentation and extract only the new features that have been added since the last release.
'''

# =========================
# Input Data for Assistant
# =========================
# inputs:
#   - Multi-line string describing the specific task for the AI assistant.
#   - Details the workflow for analyzing commit messages, generating release notes, and saving them to the appropriate location.
#   - Specifies how to handle the `[RELEASE_VERSION]` variable and where to save the generated markdown file.
#   - Supports dynamic content insertion (e.g., "%s" for variable replacement).
inputs = '''
# Task

- Extract the `RELEASE_VERSION` from the provided pom.xml file.
- Use the current date in YYYY-MM-DD format as `CURRENT_DATE`.

- Generate a concise summary of these new features, suitable for inclusion in the `<features>` section of a Maven `src/changes/changes.xml` file as a new release entry.  
    If no new features exist, state that explicitly.  
    Format the output as a short HTML list (using `<ul><li>...</li></ul>`) and provide a description.  
    Do not include fixes, refactorings, or chores—focus only on new features.

- **Generate Release Notes in Markdown:**  
   - For version `[RELEASE_VERSION]`, create a release notes document.
   - For each group, create a section with a clear heading (e.g., ## Features, ## Fixes).
   - List each change as a bullet point, using concise and descriptive language.
   - If available, include references to issue numbers or pull requests.
   - Ensure the release notes are easy to read and provide a clear summary of the changes for end users and developers.

- **Save the Release Notes:**  
   - If the file `src/changes/changes.xml` does not exist, create a new XML document using the schema `https://maven.apache.org/xsd/changes-2.0.0.xsd`. 
      The root element should be `<document>` with a single `<body>` child element.
   - Add a new `<release>` element inside `<body>`, with the following attributes:
     - `version="[RELEASE_VERSION]"`
     - `date="[CURRENT_DATE:YYYY-MM-DD]"`
   - Inside the `<release>` element, add an `<action>` element with the following attributes:
     - `dev="dev"`
     - `type="add"`
     - If `ISSUE_ID` is defined, add `issue="[ISSUE_ID]"`. If `ISSUE_ID` is not defined, do not include the `issue` attribute.
   - The text content of the `<action>` element should be `[RELEASE_NOTES]`.
   - `RELEASE_NOTES` should have HTML format.

   **Example structure for a new file:**
   ```xml
   <?xml version="1.0" encoding="UTF-8"?>
   <document xmlns="http://maven.apache.org/changes/2.0.0"
           xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"
           xsi:schemaLocation="http://maven.apache.org/changes/2.0.0 https://maven.apache.org/xsd/changes-2.0.0.xsd">
     <body>
      <release version="[RELEASE_VERSION]" date="[CURRENT_DATE:YYYY-MM-DD]">
        <action dev="dev" type="add"[IF_ISSUE_ID_PRESENT: issue="[ISSUE_ID]"]>
   <![CDATA[
        [RELEASE_NOTES]
   ]]>
        </action>
      </release>
     </body>
   </document>
   
   **If the file already exists:**
   - Insert the new `<release>` element as the last child of the `<body>` element, following the same structure as above.

   **Important:**
   - Do not include the `issue` attribute if `ISSUE_ID` is not defined.
   - Ensure the XML remains well-formed and valid according to the schema.

- **Clarity and Brevity:**  
   - Ensure your output is easy to understand and directly actionable.
   - Avoid unnecessary explanations unless clarification is requested.

'''

gw.scanDir = "glob:."
gw.interactive = true